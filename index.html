<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Route Share</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #1e272e; }
        .container { max-width: 420px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, input { width: 85%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-group { display: flex; justify-content: space-around; margin-bottom: 15px; }
        button { padding: 12px; font-size: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-create { background: #28a745; color: white; width: 45%; }
        .btn-timeout { background: #dc3545; color: white; width: 45%; }
        #downloadBtn { display: none; margin-top: 15px; text-decoration: none; }
        #downloadBtn button { width: 100%; color: white; font-size: 16px; background: #007bff; padding: 12px 30px; }
        #taxiCanvas { max-width: 100%; border: 2px solid #ccc; border-radius: 10px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: #fff; }
        .status-text { font-size: 12px; color: #007bff; font-weight: bold; margin: 5px 0; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Taxi Route Share</h2>
    
    <label for="langSelect">🗺️ Map Language / 地図の言語:</label>
    <select id="langSelect">
        <option value="auto">🌍 Auto (Browser Setting)</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="ja">🇯🇵 日本語</option>
    </select>

    <p>Enter Destination (Anywhere in the world):</p>
    <input type="text" id="destinationInput" value="Todaiji Temple">
    
    <div class="btn-group">
        <button class="btn-create" onclick="processLocation(false)">Create Image</button>
        <button class="btn-timeout" onclick="processLocation(true)">❌ Test Timeout</button>
    </div>

    <!-- 検索状況を表示するテキストエリア -->
    <div id="statusLabel" class="status-text"></div>

    <!-- ダウンロード用のリンクボタン -->
    <a id="downloadBtn" download="taxi_driver_sheet.png"><button>📥 Save to PC / Photos</button></a>

    <!-- メインの描画キャンバス -->
    <canvas id="taxiCanvas"></canvas>
</div>

<!-- ここに1つ前のステップでお渡しした「分割パーツ2」を続けて貼り付けます -->

</body>
</html>
<script>
// 開いた瞬間にデフォルトの画面を描画
window.onload = function() {
    processLocation(false);
};

// 🌍 1. 【セキュリティ突破版】無料の検索APIからリアルタイムに緯度経度を取得する
async function processLocation(isExpired) {
    const input = document.getElementById("destinationInput").value;
    const statusLabel = document.getElementById("statusLabel");
    
    if (!input.trim()) return;
    statusLabel.innerText = "🔍 Searching location data...";

    // 検索が万が一失敗した時のためのバックアップデータ
    let locationData = {
        name: input,
        lat: "35.6812", 
        lng: "139.7671"
    };

    try {
        // 🔒 GitHubのhttps環境からでもブロックされない安全なパラメータ形式でリクエストを送信
        const params = new URLSearchParams({
            q: input,
            format: "json",
            limit: "1",
            "accept-language": "en,ja" // 英語と日本語の名称を優先
        });
        
        const response = await fetch(`https://openstreetmap.org{params.toString()}`);
        const data = await response.json();
        
        if (data && data.length > 0) {
            // 本物の緯度経度を小数点4桁で正確に取得
            locationData.lat = parseFloat(data.lat).toFixed(4);
            locationData.lng = parseFloat(data.lon).toFixed(4);
            
            // 住所が長すぎる場合はスマートにトリミング
            const parts = data.display_name.split(',');
            locationData.name = parts.slice(0, 3).join(', ');
            statusLabel.innerText = "✅ Location found!";
        } else {
            statusLabel.innerText = "❌ Location not found. using text.";
        }
    } catch (e) {
        // 万が一通信エラーが起きてもエラーにせず、文字だけは必ず反映させる
        statusLabel.innerText = "⚠️ Network busy. Generated image with raw text.";
        console.error(e);
    }

    // 2. 取得した本物の情報をもとにCanvasに描き出す
    drawTaxiSheet(locationData, isExpired);
}

// 🎨 2. キャンバスへの描画（100%即時動作）
function drawTaxiSheet(locationData, isExpired) {
    let selectedLang = document.getElementById("langSelect").value;
    if (selectedLang === "auto") {
        const browserLang = (navigator.language || navigator.userLanguage).substring(0, 2);
        selectedLang = ["en", "zh", "ko", "ja"].includes(browserLang) ? browserLang : "en";
    }

    const latlngStr = `${locationData.lat}, ${locationData.lng}`;

    // 有効期限の計算（48時間）
    const now = new Date();
    const expireDate = new Date(now.getTime() + (48 * 60 * 60 * 1000));
    const expireStr = expireDate.getFullYear() + "/" + String(expireDate.getMonth() + 1).padStart(2, '0') + "/" + String(expireDate.getDate()).padStart(2, '0');

    const canvas = document.getElementById("taxiCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 400; 
    canvas.height = 540;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 白背景と赤枠
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#ff4757"; ctx.lineWidth = 8; ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

    // ドライバー用タイトル
    ctx.fillStyle = "#ff4757"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
    ctx.fillText("⚠️ 運転手さんへ (FOR DRIVER)", 200, 50);

    // 目的地情報
    ctx.fillStyle = "#1e272e"; ctx.font = "bold 14px Arial"; ctx.textAlign = "left";
    
    // 文字のはみ出し対策（2行に分けて描画）
    let nameText = "📍 目的地: " + locationData.name;
    if (nameText.length > 22) {
        ctx.fillText(nameText.substring(0, 22), 30, 100);
        ctx.fillText(nameText.substring(22, 50), 30, 122);
    } else {
        ctx.fillText(nameText, 30, 100);
    }
    
    ctx.fillText("📞 ナビTEL: 車載ナビかスマホ等で検索してください", 30, 155);
    ctx.fillText("🌐 緯度経度: " + latlngStr, 30, 195);

    ctx.fillStyle = "#ff4757"; ctx.font = "bold 15px Arial";
    ctx.fillText("⏳ 有効期限: " + expireStr + " まで", 30, 235);

    // 🗺️ 地図エリア（ローカル描画）
    const mapX = 30, mapY = 280, mapW = 140, mapH = 140;
    ctx.fillStyle = "#f1f2f6"; ctx.fillRect(mapX, mapY, mapW, mapH);
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4;
    for(let i = 20; i < mapW; i += 30) {
        ctx.beginPath(); ctx.moveTo(mapX + i, mapY); ctx.lineTo(mapX + i, mapY + mapH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mapX, mapY + i); ctx.lineTo(mapX + mapW, mapY + i); ctx.stroke();
    }
    ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(mapX + 70, mapY + 70, 8, 0, Math.PI * 2); ctx.fill();

    // 📲 二次元コードエリア（ローカル描画）
    const qrX = 230, qrY = 280, qrW = 140, qrH = 140;
    ctx.fillStyle = "#000000"; ctx.fillRect(qrX, qrY, qrW, qrH);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(qrX + 10, qrY + 10, 40, 40); ctx.fillRect(qrX + 90, qrY + 10, 40, 40); ctx.fillRect(qrX + 10, qrY + 90, 40, 40);
    ctx.fillStyle = "#000000";
    ctx.fillRect(qrX + 20, qrY + 20, 20, 20); ctx.fillRect(qrX + 100, qrY + 20, 20, 20); ctx.fillRect(qrX + 20, qrY + 100, 20, 20);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(qrX + 60, qrY + 60, 20, 20); ctx.fillRect(qrX + 80, qrY + 80, 20, 20); ctx.fillRect(qrX + 60, qrY + 100, 20, 20);

    // ラベル
    ctx.fillStyle = "#718093"; ctx.font = "12px Arial"; ctx.textAlign = "center";
    ctx.fillText(`Map (${selectedLang.toUpperCase()})`, 100, 440);
    ctx.fillText("Driver QR", 300, 440);

    // 🔒 タイムアウト時の目隠し（すりガラス）処理
    if (isExpired) {
        ctx.fillStyle = "rgba(47, 53, 66, 0.96)"; 
        ctx.fillRect(20, 75, 360, 375);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
        ctx.fillText("🔒 EXPIRED / 失効しました", 200, 240);
        ctx.font = "12px Arial"; ctx.fillStyle = "#a4b0be";
        ctx.fillText("This ticket is no longer available.", 200, 270);
    }

    // フッター
    ctx.fillStyle = "#718093"; ctx.font = "14px Arial"; ctx.textAlign = "left";
    ctx.fillText("Powered by TaxiQR Share", 30, 500);

    // 保存リンクの生成
    try {
        const finalImageUrl = canvas.toDataURL("image/png");
        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.href = finalImageUrl;
        downloadBtn.style.display = "inline-block";
    } catch (e) {
        console.log("Error converting URL");
    }
}
</script>
