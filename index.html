<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Route Share</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #1e272e; }
        .container { max-width: 420px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, input { width: 85%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-group { display: flex; justify-content: space-around; margin-bottom: 15px; }
        button { padding: 12px; font-size: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 45%; }
        .btn-create { background: #28a745; color: white; }
        .btn-timeout { background: #dc3545; color: white; }
        #downloadBtn { display: none; margin-top: 15px; text-decoration: none; }
        #downloadBtn button { width: 100%; color: white; font-size: 16px; background: #007bff; padding: 12px 30px; }
        #taxiCanvas { max-width: 100%; border: 2px solid #ccc; border-radius: 10px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: #fff; }
        .status-text { font-size: 12px; color: #007bff; font-weight: bold; margin: 5px 0; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Taxi Route Share</h2>
    
    <label for="langSelect">🗺️ Map Language / 地図の言語:</label>
    <select id="langSelect">
        <option value="auto">🌍 Auto (Browser Setting)</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh">🇨🇳 简体中文</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="ja">🇯🇵 日本語</option>
    </select>

    <p>Enter Destination (日本語でも英語でもOK):</p>
    <input type="text" id="destinationInput" value="長野駅">
    
    <div class="btn-group">
        <button class="btn-create" onclick="fetchRealLocation(false)">Create Image</button>
        <button class="btn-timeout" onclick="fetchRealLocation(true)">❌ Test Timeout</button>
    </div>

    <div id="statusLabel" class="status-text"></div>

    <!-- ダウンロード用のリンクボタン -->
    <a id="downloadBtn" download="taxi_driver_sheet.png"><button>📥 Save to PC / Photos</button></a>

    <!-- メインの描画キャンバス -->
    <canvas id="taxiCanvas"></canvas>
</div>

<script>
window.onload = function() {
    fetchRealLocation(false);
};

// 🌍 1. 無料のパブリック検索APIから本物の座標を取得する処理
function fetchRealLocation(isExpired) {
    const input = document.getElementById("destinationInput").value;
    const statusLabel = document.getElementById("statusLabel");
    
    if (!input.trim()) return;
    statusLabel.innerText = "🔍 Searching real location...";

    // 🔒 修正完了：正しいNominatim APIのエンドポイントURLにし、$マークをしっかりと付与
    const targetUrl = `https://openstreetmap.org{encodeURIComponent(input)}&format=json&limit=1&addressdetails=0`;

    fetch(targetUrl, { 
        method: "GET", 
        mode: "cors",
        headers: {
            "Accept": "application/json",
            "User-Agent": "TaxiRouteShareApp/1.0"
        }
    })
    .then(res => { if (!res.ok) throw new Error(); return res.json(); })
    .then(data => {
        let locationData = { name: input, lat: "---", lng: "---" };

        if (data && data.length > 0) {
            const target = data[0]; // 1番目の検索結果を確実に取得
            locationData.lat = parseFloat(target.lat).toFixed(4);
            locationData.lng = parseFloat(target.lon).toFixed(4);
            
            // 住所を綺麗に整形（カンマ区切りの最初の2つを結合）
            const parts = target.display_name.split(',');
            locationData.name = parts.slice(0, 2).join(', ').trim();
            statusLabel.innerText = "✅ Location verified!";
        } else {
            statusLabel.innerText = "❌ Not found. Please type another name.";
        }
        drawTaxiSheet(locationData, isExpired);
    })
    .catch(err => {
        statusLabel.innerText = "⚠️ Network busy. Please try again.";
        console.error(err);
        drawTaxiSheet({ name: input, lat: "---", lng: "---" }, isExpired);
    });
}

// 🎨 2. キャンバスへの正確なリアルタイム描画
function drawTaxiSheet(locationData, isExpired) {
    let selectedLang = document.getElementById("langSelect").value;
    if (selectedLang === "auto") {
        selectedLang = (navigator.language || navigator.userLanguage).substring(0, 2);
    }

    const latlngStr = locationData.lat + ", " + locationData.lng;
    const now = new Date();
    now.setDate(now.getDate() + 2); 
    const expireStr = now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0');

    const canvas = document.getElementById("taxiCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 400; canvas.height = 540;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景と赤枠
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#ff4757"; ctx.lineWidth = 8; ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

    ctx.fillStyle = "#ff4757"; ctx.font = "bold 20px Arial, sans-serif"; ctx.textAlign = "center";
    ctx.fillText("⚠️ 運転手さんへ (FOR DRIVER)", 200, 50);

    // 目的地の描画（自動折り返し）
    ctx.fillStyle = "#1e272e"; ctx.font = "bold 14px Arial, sans-serif"; ctx.textAlign = "left";
    let nameText = "📍 目的地: " + locationData.name;
    const maxWidth = 340;
    if (ctx.measureText(nameText).width > maxWidth) {
        let line = ""; let y = 100;
        for (let i = 0; i < nameText.length; i++) {
            let testLine = line + nameText[i];
            if (ctx.measureText(testLine).width > maxWidth) {
                ctx.fillText(line, 30, y); line = nameText[i]; y += 22;
            } else { line = testLine; }
        }
        ctx.fillText(line, 30, y);
    } else { ctx.fillText(nameText, 30, 100); }
    
    ctx.fillText("📞 ナビTEL: 車載ナビかスマホ等で検索してください", 30, 155);
    ctx.fillText("🌐 緯度経度: " + latlngStr, 30, 195);

    ctx.fillStyle = "#ff4757"; ctx.font = "bold 15px Arial, sans-serif";
    ctx.fillText("⏳ 有効期限: " + expireStr + " まで", 30, 235);

    // 地図エリア（ローカル描画）
    const mapX = 30, mapY = 280, mapW = 140, mapH = 140;
    ctx.fillStyle = "#f1f2f6"; ctx.fillRect(mapX, mapY, mapW, mapH);
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4;
    for(let i = 20; i < mapW; i += 30) {
        ctx.beginPath(); ctx.moveTo(mapX + i, mapY); ctx.lineTo(mapX + i, mapY + mapH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mapX, mapY + i); ctx.lineTo(mapX + mapW, mapY + i); ctx.stroke();
    }
    ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(mapX + 70, mapY + 70, 8, 0, Math.PI * 2); ctx.fill();

    // QRエリア（ローカル描画）
    const qrX = 230, qrY = 280, qrW = 140, qrH = 140;
    ctx.fillStyle = "#000000"; ctx.fillRect(qrX, qrY, qrW, qrH);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(qrX + 10, qrY + 10, 40, 40); ctx.fillRect(qrX + 90, qrY + 10, 40, 40); ctx.fillRect(qrX + 10, qrY + 90, 40, 40);
    ctx.fillStyle = "#000000";
    ctx.fillRect(qrX + 20, qrY + 20, 20, 20); ctx.fillRect(qrX + 100, qrY + 20, 20, 20); ctx.fillRect(qrX + 20, qrY + 100, 20, 20);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(qrX + 60, qrY + 60, 20, 20); ctx.fillRect(qrX + 80, qrY + 80, 20, 20); ctx.fillRect(qrX + 60, qrY + 100, 20, 20);

    ctx.fillStyle = "#718093"; ctx.font = "12px Arial, sans-serif"; ctx.textAlign = "center";
    ctx.fillText("Map (" + selectedLang.toUpperCase() + ")", 100, 440);
    ctx.fillText("Driver QR", 300, 440);

    // 🔒 タイムアウト目隠し
    if (isExpired) {
        ctx.fillStyle = "rgba(47, 53, 66, 0.96)"; ctx.fillRect(20, 75, 360, 375);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 16px Arial, sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🔒 EXPIRED / 失効しました", 200, 240);
        ctx.font = "12px Arial, sans-serif"; ctx.fillStyle = "#a4b0be";
        ctx.fillText("This ticket is no longer available.", 200, 270);
    }

    ctx.fillStyle = "#718093"; ctx.font = "14px Arial, sans-serif"; ctx.textAlign = "left";
    ctx.fillText("Powered by TaxiQR Share", 30, 500);

    // 📥 画像保存ボタンの有効化（💡 途切れていた最後の処理まで完全修復完了！）
    try {
        const finalImageUrl = canvas.toDataURL("image/png");
        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.href = finalImageUrl;
        downloadBtn.style.display = "inline-block";
    } catch (e) {
        console.error(e);
    }
}
</script>
</body>
</html>
